version: "3.9"

services:
  ivents-ui-support:
    build: .
    image: ivents-ui-support:latest
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ivents_data
      SPRING_DATASOURCE_USERNAME: ivents
      SPRING_DATASOURCE_PASSWORD: 1234password
      SPRING_REDIS_HOST: shared-redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: strongpassword
    networks:
      - shared_network
    restart: unless-stopped

networks:
  shared_network:
    external: true